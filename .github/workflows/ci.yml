name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Test the web interface
        run: npm test

      - name: Lint the web interface
        run: npm run lint

      - name: Build the production interface
        run: npm run build

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the project
        run: python -m pip install -e '.[test]'

      - name: Validate the Compose model
        run: docker compose config --quiet

      - name: Run the test and coverage gate
        run: >-
          python -m pytest
          --cov=maintenance_assistant
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=90
          -q

  container:
    name: Container runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AMA_RUN_CONTAINER_TESTS: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the test tooling
        run: python -m pip install -e '.[test]'

      - name: Build and test the container
        run: python -m pytest tests/container -q
