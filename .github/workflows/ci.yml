name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the project
        run: python -m pip install -e '.[test]'

      - name: Validate the Compose model
        run: docker compose config --quiet

      - name: Run the test and coverage gate
        run: >-
          python -m pytest
          --cov=maintenance_assistant
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=90
          -q

  container:
    name: Container runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AMA_RUN_CONTAINER_TESTS: "1"
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the test tooling
        run: python -m pip install -e '.[test]'

      - name: Build and test the container
        run: python -m pytest tests/container -q
