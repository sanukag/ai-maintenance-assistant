services:
  qdrant:
    image: qdrant/qdrant:v1.18.2-unprivileged
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/storage/snapshots
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - 127.0.0.1:${AMA_QDRANT_PORT:-6333}:6333
    tmpfs:
      - /tmp:size=32m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      AMA_DATA_DIRECTORY: /app/data
      AMA_MAX_DOCUMENT_SIZE_MB: ${AMA_MAX_DOCUMENT_SIZE_MB:-25}
      AMA_SUPPORTED_FILE_TYPES: ${AMA_SUPPORTED_FILE_TYPES:-.pdf,.txt,.md,.png,.jpg,.jpeg}
      AMA_CHUNK_SIZE_TOKENS: ${AMA_CHUNK_SIZE_TOKENS:-300}
      AMA_CHUNK_OVERLAP_TOKENS: ${AMA_CHUNK_OVERLAP_TOKENS:-40}
      AMA_PARENT_CHUNK_SIZE_TOKENS: ${AMA_PARENT_CHUNK_SIZE_TOKENS:-900}
      AMA_CHUNK_TOKEN_ENCODING: ${AMA_CHUNK_TOKEN_ENCODING:-cl100k_base}
      AMA_LOG_LEVEL: ${AMA_LOG_LEVEL:-INFO}
      AMA_OCR_PROVIDER: ${AMA_OCR_PROVIDER:-tesseract}
      AMA_OCR_LANGUAGE: ${AMA_OCR_LANGUAGE:-eng}
      AMA_OCR_DPI: ${AMA_OCR_DPI:-300}
      AMA_OCR_PAGE_TIMEOUT_SECONDS: ${AMA_OCR_PAGE_TIMEOUT_SECONDS:-30}
      AMA_OCR_MAX_PAGES: ${AMA_OCR_MAX_PAGES:-100}
      AMA_OCR_MAX_IMAGE_PIXELS: ${AMA_OCR_MAX_IMAGE_PIXELS:-50000000}
      AMA_VISUAL_ANALYSIS_MODEL: ${AMA_VISUAL_ANALYSIS_MODEL:-gpt-5.6-terra}
      AMA_VISUAL_ANALYSIS_DETAIL: ${AMA_VISUAL_ANALYSIS_DETAIL:-high}
      AMA_VISUAL_ANALYSIS_RENDER_DPI: ${AMA_VISUAL_ANALYSIS_RENDER_DPI:-150}
      AMA_VISUAL_ANALYSIS_TIMEOUT_SECONDS: ${AMA_VISUAL_ANALYSIS_TIMEOUT_SECONDS:-60}
      AMA_VISUAL_ANALYSIS_MAX_PAGES: ${AMA_VISUAL_ANALYSIS_MAX_PAGES:-100}
      AMA_VISUAL_ANALYSIS_MAX_IMAGE_PIXELS: ${AMA_VISUAL_ANALYSIS_MAX_IMAGE_PIXELS:-25000000}
      AMA_VISUAL_ANALYSIS_MAX_OUTPUT_TOKENS: ${AMA_VISUAL_ANALYSIS_MAX_OUTPUT_TOKENS:-1000}
      AMA_EMBEDDING_MODEL: ${AMA_EMBEDDING_MODEL:-text-embedding-3-small}
      AMA_EMBEDDING_DIMENSIONS: ${AMA_EMBEDDING_DIMENSIONS:-512}
      AMA_EMBEDDING_BATCH_SIZE: ${AMA_EMBEDDING_BATCH_SIZE:-128}
      AMA_EMBEDDING_CACHE_MAX_ENTRIES: ${AMA_EMBEDDING_CACHE_MAX_ENTRIES:-10000}
      AMA_SQLITE_BUSY_TIMEOUT_MS: ${AMA_SQLITE_BUSY_TIMEOUT_MS:-5000}
      AMA_VECTOR_STORE: ${AMA_VECTOR_STORE:-qdrant}
      AMA_QDRANT_URL: http://qdrant:6333
      AMA_QDRANT_TIMEOUT_SECONDS: ${AMA_QDRANT_TIMEOUT_SECONDS:-5}
      AMA_RETRIEVAL_CANDIDATE_LIMIT: ${AMA_RETRIEVAL_CANDIDATE_LIMIT:-30}
      AMA_RETRIEVAL_RRF_K: ${AMA_RETRIEVAL_RRF_K:-60}
      AMA_RETRIEVAL_SEMANTIC_WEIGHT: ${AMA_RETRIEVAL_SEMANTIC_WEIGHT:-1}
      AMA_RETRIEVAL_TEXT_WEIGHT: ${AMA_RETRIEVAL_TEXT_WEIGHT:-1}
      AMA_RERANK_MODEL: ${AMA_RERANK_MODEL:-gpt-5.6-terra}
      AMA_RERANK_CANDIDATE_LIMIT: ${AMA_RERANK_CANDIDATE_LIMIT:-15}
      AMA_RERANK_MIN_SCORE: ${AMA_RERANK_MIN_SCORE:-0.25}
      AMA_RERANK_MAX_OUTPUT_TOKENS: ${AMA_RERANK_MAX_OUTPUT_TOKENS:-1000}
      AMA_ANSWER_MODEL: ${AMA_ANSWER_MODEL:-gpt-5.6-terra}
      AMA_ANSWER_MAX_OUTPUT_TOKENS: ${AMA_ANSWER_MAX_OUTPUT_TOKENS:-1000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - 127.0.0.1:${AMA_API_PORT:-8000}:8000
    volumes:
      - maintenance-data:/app/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    depends_on:
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["ama-worker", "--poll-seconds", "1"]
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      AMA_DATA_DIRECTORY: /app/data
      AMA_MAX_DOCUMENT_SIZE_MB: ${AMA_MAX_DOCUMENT_SIZE_MB:-25}
      AMA_SUPPORTED_FILE_TYPES: ${AMA_SUPPORTED_FILE_TYPES:-.pdf,.txt,.md,.png,.jpg,.jpeg}
      AMA_CHUNK_SIZE_TOKENS: ${AMA_CHUNK_SIZE_TOKENS:-300}
      AMA_CHUNK_OVERLAP_TOKENS: ${AMA_CHUNK_OVERLAP_TOKENS:-40}
      AMA_PARENT_CHUNK_SIZE_TOKENS: ${AMA_PARENT_CHUNK_SIZE_TOKENS:-900}
      AMA_CHUNK_TOKEN_ENCODING: ${AMA_CHUNK_TOKEN_ENCODING:-cl100k_base}
      AMA_LOG_LEVEL: ${AMA_LOG_LEVEL:-INFO}
      AMA_OCR_PROVIDER: ${AMA_OCR_PROVIDER:-tesseract}
      AMA_OCR_LANGUAGE: ${AMA_OCR_LANGUAGE:-eng}
      AMA_OCR_DPI: ${AMA_OCR_DPI:-300}
      AMA_OCR_PAGE_TIMEOUT_SECONDS: ${AMA_OCR_PAGE_TIMEOUT_SECONDS:-30}
      AMA_OCR_MAX_PAGES: ${AMA_OCR_MAX_PAGES:-100}
      AMA_OCR_MAX_IMAGE_PIXELS: ${AMA_OCR_MAX_IMAGE_PIXELS:-50000000}
      AMA_VISUAL_ANALYSIS_MODEL: ${AMA_VISUAL_ANALYSIS_MODEL:-gpt-5.6-terra}
      AMA_VISUAL_ANALYSIS_DETAIL: ${AMA_VISUAL_ANALYSIS_DETAIL:-high}
      AMA_VISUAL_ANALYSIS_RENDER_DPI: ${AMA_VISUAL_ANALYSIS_RENDER_DPI:-150}
      AMA_VISUAL_ANALYSIS_TIMEOUT_SECONDS: ${AMA_VISUAL_ANALYSIS_TIMEOUT_SECONDS:-60}
      AMA_VISUAL_ANALYSIS_MAX_PAGES: ${AMA_VISUAL_ANALYSIS_MAX_PAGES:-100}
      AMA_VISUAL_ANALYSIS_MAX_IMAGE_PIXELS: ${AMA_VISUAL_ANALYSIS_MAX_IMAGE_PIXELS:-25000000}
      AMA_VISUAL_ANALYSIS_MAX_OUTPUT_TOKENS: ${AMA_VISUAL_ANALYSIS_MAX_OUTPUT_TOKENS:-1000}
      AMA_EMBEDDING_MODEL: ${AMA_EMBEDDING_MODEL:-text-embedding-3-small}
      AMA_EMBEDDING_DIMENSIONS: ${AMA_EMBEDDING_DIMENSIONS:-512}
      AMA_EMBEDDING_BATCH_SIZE: ${AMA_EMBEDDING_BATCH_SIZE:-128}
      AMA_EMBEDDING_CACHE_MAX_ENTRIES: ${AMA_EMBEDDING_CACHE_MAX_ENTRIES:-10000}
      AMA_SQLITE_BUSY_TIMEOUT_MS: ${AMA_SQLITE_BUSY_TIMEOUT_MS:-5000}
      AMA_VECTOR_STORE: ${AMA_VECTOR_STORE:-qdrant}
      AMA_QDRANT_URL: http://qdrant:6333
      AMA_QDRANT_TIMEOUT_SECONDS: ${AMA_QDRANT_TIMEOUT_SECONDS:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - maintenance-data:/app/data
    tmpfs:
      - /tmp:size=128m,mode=1777
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 3s
      start_period: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      AMA_API_BASE_URL: http://api:8000
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - 127.0.0.1:${AMA_WEB_PORT:-3000}:3000
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /app/.next/cache:size=32m,mode=1777
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000').then(r => {
            if (!r.ok) process.exit(1)
          }).catch(() => process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

volumes:
  maintenance-data:
  qdrant-data:
